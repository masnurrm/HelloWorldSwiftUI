trigger:
  branches:
    include:
      - main
  paths:
    include:
      - HelloWorldBasic/**
      - HelloWorldTextField/**

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'macos-15'

variables:
  sdk: 'iphonesimulator'
  configuration: 'Debug'
  scheme: 'HelloWorld'
  derivedDataPath: '$(Build.ArtifactStagingDirectory)/DerivedData'

stages:

# ─────────────────────────────────────────────
# STAGE 1: Build HelloWorldBasic
# ─────────────────────────────────────────────
- stage: Build_HelloWorldBasic
  displayName: 'Build - HelloWorld Basic'
  jobs:
    - job: BuildBasic
      displayName: 'Xcode Build (HelloWorldBasic)'
      steps:

        - checkout: self

        - task: Xcode@5
          displayName: 'Build HelloWorldBasic for Simulator'
          inputs:
            actions: 'build'
            configuration: '$(configuration)'
            sdk: '$(sdk)'
            xcWorkspacePath: 'HelloWorldBasic/HelloWorld.xcodeproj'
            scheme: '$(scheme)'
            packageApp: false
            useXcpretty: true
            args: '-derivedDataPath $(derivedDataPath)/HelloWorldBasic ONLY_ACTIVE_ARCH=NO'

        - task: Xcode@5
          displayName: 'Run Unit Tests (HelloWorldBasic)'
          inputs:
            actions: 'test'
            configuration: '$(configuration)'
            sdk: '$(sdk)'
            xcWorkspacePath: 'HelloWorldBasic/HelloWorld.xcodeproj'
            scheme: '$(scheme)'
            packageApp: false
            useXcpretty: true
            # Use built-in destination inputs to avoid quote-stripping issue
            destinationPlatformOption: 'iOS'
            destinationSimulators: 'iPhone 16 Pro'
            args: '-derivedDataPath $(derivedDataPath)/HelloWorldBasic'
          continueOnError: false

        - task: PublishTestResults@2
          displayName: 'Publish Test Results (HelloWorldBasic)'
          condition: always()
          inputs:
            testResultsFormat: 'JUnit'
            testResultsFiles: '$(derivedDataPath)/HelloWorldBasic/**/TEST-*.xml'
            failTaskOnFailedTests: true
            testRunTitle: 'HelloWorldBasic - Unit Tests'

# ─────────────────────────────────────────────
# STAGE 2: Build HelloWorldTextField
# ─────────────────────────────────────────────
- stage: Build_HelloWorldTextField
  displayName: 'Build - HelloWorld TextField'
  dependsOn: Build_HelloWorldBasic
  jobs:
    - job: BuildTextField
      displayName: 'Xcode Build (HelloWorldTextField)'
      steps:

        - checkout: self

        - task: Xcode@5
          displayName: 'Build HelloWorldTextField for Simulator'
          inputs:
            actions: 'build'
            configuration: '$(configuration)'
            sdk: '$(sdk)'
            xcWorkspacePath: 'HelloWorldTextField/HelloWorld.xcodeproj'
            scheme: '$(scheme)'
            packageApp: false
            useXcpretty: true
            args: '-derivedDataPath $(derivedDataPath)/HelloWorldTextField ONLY_ACTIVE_ARCH=NO'

        - task: Xcode@5
          displayName: 'Run Unit Tests (HelloWorldTextField)'
          inputs:
            actions: 'test'
            configuration: '$(configuration)'
            sdk: '$(sdk)'
            xcWorkspacePath: 'HelloWorldTextField/HelloWorld.xcodeproj'
            scheme: '$(scheme)'
            packageApp: false
            useXcpretty: true
            # Use built-in destination inputs to avoid quote-stripping issue
            destinationPlatformOption: 'iOS'
            destinationSimulators: 'iPhone 16 Pro'
            args: '-derivedDataPath $(derivedDataPath)/HelloWorldTextField'
          continueOnError: false

        - task: PublishTestResults@2
          displayName: 'Publish Test Results (HelloWorldTextField)'
          condition: always()
          inputs:
            testResultsFormat: 'JUnit'
            testResultsFiles: '$(derivedDataPath)/HelloWorldTextField/**/TEST-*.xml'
            failTaskOnFailedTests: true
            testRunTitle: 'HelloWorldTextField - Unit Tests'
